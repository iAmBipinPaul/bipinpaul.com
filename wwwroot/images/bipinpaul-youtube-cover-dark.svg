<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440" role="img" aria-labelledby="title desc">
  <title id="title">Bipin Paul YouTube cover</title>
  <desc id="desc">Minimal, professional YouTube banner for Bipin Paul using a centered safe-area layout and concise profile details.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>

    <radialGradient id="halo-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 300) rotate(18) scale(900 700)">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="halo-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(2100 980) rotate(-8) scale(620 520)">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1B2638" stop-opacity="0.98"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="profile-clip">
      <circle cx="1752" cy="626" r="92" />
    </clipPath>
  </defs>

  <rect width="2560" height="1440" fill="url(#bg)"/>
  <ellipse cx="520" cy="300" rx="900" ry="700" fill="url(#halo-left)"/>
  <ellipse cx="2100" cy="980" rx="620" ry="520" fill="url(#halo-right)"/>

  <g opacity="0.3">
    <circle cx="2130" cy="250" r="170" fill="none" stroke="#334155" stroke-width="2"/>
    <circle cx="2130" cy="250" r="115" fill="none" stroke="#334155" stroke-width="2"/>
    <circle cx="390" cy="1160" r="130" fill="none" stroke="#334155" stroke-width="2"/>
    <path d="M2040 1090 C2170 1040 2260 1100 2340 1210" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="450" width="1560" height="540" rx="44" fill="url(#panel)" stroke="#334155"/>
    <rect x="1568" y="490" width="368" height="460" rx="30" fill="#1F2937" stroke="#334155"/>
  </g>

  <text x="620" y="560" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="6" fill="#60A5FA">BIPIN PAUL</text>
  <text x="620" y="666" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="92" font-weight="800" fill="#E2E8F0">Software Engineer</text>
  <text x="620" y="742" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="50" font-weight="700" fill="#93C5FD">.NET • Blazor • Azure</text>

  <text x="620" y="820" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="30" font-weight="500" fill="#94A3B8">Building reliable backend, cloud, and business systems with</text>
  <text x="620" y="866" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="30" font-weight="500" fill="#94A3B8">ASP.NET Core, clean architecture, and practical product delivery.</text>

  <g>
    <rect x="620" y="912" width="160" height="50" rx="25" fill="#1E293B" stroke="#475569"/>
    <circle cx="646" cy="937" r="5" fill="#4ADE80"/>
    <text x="668" y="944" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">7+ Years</text>

    <rect x="796" y="912" width="220" height="50" rx="25" fill="#1E293B" stroke="#475569"/>
    <circle cx="822" cy="937" r="5" fill="#38BDF8"/>
    <text x="844" y="944" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">Full Stack .NET</text>

    <rect x="1032" y="912" width="288" height="50" rx="25" fill="#1E293B" stroke="#475569"/>
    <circle cx="1058" cy="937" r="5" fill="#FBBF24"/>
    <text x="1080" y="944" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">ERP • QMS • Cloud Apps</text>
  </g>

  <g>
    <!-- Card centerline is x=1752. Left edge of tags is at 1622 which was off-center -->
    <circle cx="1752" cy="626" r="96" fill="transparent" stroke="url(#accent)" stroke-width="4"/>
    <image href="bipinpaul.jpeg" x="1656" y="530" height="192" width="192" preserveAspectRatio="xMidYMid slice" clip-path="url(#profile-clip)"/>

    <text x="1752" y="782" text-anchor="middle" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4" fill="#60A5FA">CORE STACK</text>

    <!-- Center tags around 1752. Top row width: 114+16+92 = 222. Left edge: 1641 -->
    <rect x="1641" y="812" width="114" height="42" rx="21" fill="#1E293B" stroke="#475569"/>
    <text x="1698" y="839" text-anchor="middle" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">ASP.NET</text>

    <rect x="1771" y="812" width="92" height="42" rx="21" fill="#1E293B" stroke="#475569"/>
    <text x="1817" y="839" text-anchor="middle" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">Blazor</text>

    <!-- Bottom row width: 82+16+124 = 222. Left edge: 1641 -->
    <rect x="1641" y="868" width="82" height="42" rx="21" fill="#1E293B" stroke="#475569"/>
    <text x="1682" y="895" text-anchor="middle" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">Azure</text>

    <rect x="1739" y="868" width="124" height="42" rx="21" fill="#1E293B" stroke="#475569"/>
    <text x="1801" y="895" text-anchor="middle" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#E2E8F0">SQL Server</text>
  </g>

  <text x="620" y="1090" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="28" font-weight="700" fill="#E2E8F0">bipinpaul.com</text>
  <circle cx="859" cy="1081" r="4" fill="#64748B"/>
  <text x="885" y="1090" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="28" font-weight="500" fill="#94A3B8">github.com/iambipinpaul</text>
  <circle cx="1384" cy="1081" r="4" fill="#64748B"/>
  <text x="1410" y="1090" font-family="Segoe UI, Manrope, Arial, sans-serif" font-size="28" font-weight="500" fill="#94A3B8">linkedin.com/in/iambipinpaul</text>
</svg>
